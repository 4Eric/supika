name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: yby_admin
          POSTGRES_PASSWORD: manage
          POSTGRES_DB: yby_vibe
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm ci

      - name: Setup Test Database
        working-directory: ./backend
        run: node scripts/setup_pg.js
        env:
          DATABASE_URL: postgresql://yby_admin:manage@localhost:5433/yby_vibe
          NODE_ENV: test

      - name: Run Backend Tests
        working-directory: ./backend
        run: npm test
        env:
          DATABASE_URL: postgresql://yby_admin:manage@localhost:5433/yby_vibe
          JWT_SECRET: supersecret_test_key
          NODE_ENV: test

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build Frontend
        working-directory: ./frontend
        run: npm run build
